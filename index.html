<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enquiry Form</title>
</head>
<body>

  <label for="program">Learning Program</label>
  <select id="program">
    <option value="">Loading...</option>
  </select>

  <script>
    fetch('https://creationtechnology4.my.salesforce-sites.com/services/apexrest/learning-programs/')
      .then(res => res.json())
      .then(data => {
        const el = document.getElementById('program');
        el.innerHTML = '<option value="">-- Select a Program --</option>';
        data.forEach(p => {
          const o = document.createElement('option');
          o.value = p.Id;
          o.textContent = p.Name;
          el.appendChild(o);
        });
      })
      .catch(() => {
        document.getElementById('program').innerHTML = 
          '<option value="">Failed to load</option>';
      });
  </script>

</body>
</html>
